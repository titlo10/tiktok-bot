name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.BER_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ vars.BER_HOST }}
          DEPLOY_PORT: ${{ vars.BER_SSH_PORT || '4242' }}
        run: |
          install -d -m 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
          {
            echo "Host deploy-target"
            echo "  HostName $DEPLOY_HOST"
            echo "  Port $DEPLOY_PORT"
            echo "  User deployer"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo "  StrictHostKeyChecking yes"
          } > ~/.ssh/config
      - name: Package release
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: tar -czf "/tmp/tiktok-bot-${RELEASE_SHA}.tar.gz" --exclude=.git --exclude=.venv .
      - name: Upload release
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: scp "/tmp/tiktok-bot-${RELEASE_SHA}.tar.gz" "deploy-target:/tmp/tiktok-bot-${RELEASE_SHA}.tar.gz"
      - name: Activate release
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: ssh deploy-target sudo /usr/local/sbin/deploy-tiktok-bot "$RELEASE_SHA" "/tmp/tiktok-bot-${RELEASE_SHA}.tar.gz"
