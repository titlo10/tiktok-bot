CONFIG_VERSION=12

# Настройки загрузки видео
TIKTOK_USER=""
DOWNLOAD_LIKED_VIDEOS=true
DOWNLOAD_SAVED_VIDEOS=true

# Настройки Telegram
# TELEGRAM_CHAT_ID — служебный чат/канал, куда бот кратковременно
# загружает видео, чтобы получить file_id для inline-результата.
# Сообщение сразу удаляется; в пользовательский чат уходит уже
# inline-видео от имени того, кто вызвал @бота.
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# Настройки проверки доступности
CHECK_INTERVAL_DAYS=7

# Пытаться скачать failed видео, вдруг их восстановили
HOPE_MODE=false
MAX_RETRIES=3

# Настройки прокси и user-agent
PROXY=""
USER_AGENT=""
CHECK_TIKTOK_AVAILABILITY=true

# Пути к файлам и директориям
# Все пути относительно директории config (или абсолютные)
DATABASE=tiktok_videos.db
DOWNLOADS_DIR=./downloads  # при запуске в докере путь всегда /downloads
KEEP_DOWNLOADS=true
TIKTOK_DATA_FILE=user_data_tiktok.json
# Опционально: для комментариев и если yt-dlp просит логин
COOKIES_FILE=cookies.txt
